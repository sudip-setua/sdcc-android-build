name: Fetch Termux SDCC (Ultimate Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download and Extract SDCC
      run: |
        mkdir sdcc-extract
        cd sdcc-extract
        
        echo "1. Downloading Termux Packages Index (.xz)..."
        wget -q https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/dists/stable/main/binary-aarch64/Packages.xz
        
        echo "2. Decompressing Index..."
        xz -d Packages.xz
        
        echo "3. Finding SDCC Package..."
        # প্যাকেজ লিস্ট থেকে sdcc এর আসল ফাইলের নামটা বের করা হচ্ছে
        SDCC_PATH=$(awk '/^Package: sdcc$/{f=1} f && /^Filename:/{print $2; exit}' Packages)
        
        if [ -z "$SDCC_PATH" ]; then
          echo "Error: SDCC package not found in index!"
          exit 1
        fi
        
        echo "Found path: $SDCC_PATH"
        
        echo "4. Downloading SDCC Package..."
        wget -q "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/$SDCC_PATH" -O sdcc.deb
        
        echo "5. Extracting DEB..."
        ar x sdcc.deb
        tar -xf data.tar.xz
        
        echo "6. Organizing Files for P.I.C.S. App..."
        mkdir -p FINAL_SDCC/bin
        mkdir -p FINAL_SDCC/share
        
        # অ্যাপের জন্য প্রয়োজনীয় টুলস কপি করা হচ্ছে
        cp data/data/com.termux/files/usr/bin/sdcc FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdcpp FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdas8051 FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdld FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/packihx FINAL_SDCC/bin/ || true
        
        # হেডার এবং লাইব্রেরি ফাইল কপি করা হচ্ছে
        cp -r data/data/com.termux/files/usr/share/sdcc FINAL_SDCC/share/
        
        echo "Success! All files are ready."

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: SDCC-Android-Ready
        path: sdcc-extract/FINAL_SDCC/
        
