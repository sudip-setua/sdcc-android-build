name: Get Termux SDCC Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch and Extract SDCC from Termux
      run: |
        mkdir sdcc-extract
        cd sdcc-extract
        
        echo "Downloading Termux Packages Index..."
        wget -q https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages
        
        echo "Finding SDCC package URL..."
        SDCC_DEB=$(grep -A 15 "Package: sdcc" Packages | grep "Filename:" | head -n 1 | awk '{print $2}')
        echo "Found SDCC URL: $SDCC_DEB"
        
        echo "Downloading SDCC Package..."
        wget "https://packages.termux.dev/apt/termux-main/$SDCC_DEB" -O sdcc.deb
        
        echo "Extracting Package..."
        ar x sdcc.deb
        tar -xf data.tar.xz
        
        echo "Preparing Final Folder for App..."
        mkdir -p FINAL_SDCC/bin
        mkdir -p FINAL_SDCC/share
        
        # Copying only the Native Android Binaries we need
        cp data/data/com.termux/files/usr/bin/sdcc FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdcpp FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdas8051 FINAL_SDCC/bin/
        cp data/data/com.termux/files/usr/bin/sdld FINAL_SDCC/bin/
        
        # Copying Headers and Libraries
        cp -r data/data/com.termux/files/usr/share/sdcc FINAL_SDCC/share/

    - name: Upload Binaries for Download
      uses: actions/upload-artifact@v4
      with:
        name: SDCC-Android-Ready
        path: sdcc-extract/FINAL_SDCC/
        
