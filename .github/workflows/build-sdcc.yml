name: Get Termux SDCC Binaries (Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch SDCC from Tsinghua Mirror
      run: |
        mkdir sdcc-extract
        cd sdcc-extract
        
        echo "1. Connecting to Secure Mirror..."
        # HTML পেজ থেকে aarch64 (অ্যান্ড্রয়েড প্রসেসর) এর ফাইলটার নাম খুঁজবে
        DEB_FILE=$(curl -sL https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/s/sdcc/ | grep -oE 'sdcc_[0-9\.\-]+_aarch64\.deb' | tail -n 1)
        
        if [ -z "$DEB_FILE" ]; then
          echo "Error: Could not find the file!"
          exit 1
        fi
        
        echo "2. Found File: $DEB_FILE. Downloading..."
        curl -sL -o sdcc.deb "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/s/sdcc/$DEB_FILE"
        
        echo "3. Extracting the Package..."
        ar x sdcc.deb
        tar -xf data.tar.xz
        
        echo "4. Organizing Files for P.I.C.S. App..."
        mkdir -p FINAL_SDCC/share
        
        # সমস্ত কম্পাইলার ফাইল (sdcc, sdcpp, sdas8051, packihx) কপি করা হচ্ছে
        cp -r data/data/com.termux/files/usr/bin FINAL_SDCC/
        
        # সমস্ত হেডার (.h) এবং লাইব্রেরি কপি করা হচ্ছে
        cp -r data/data/com.termux/files/usr/share/sdcc FINAL_SDCC/share/
        
        echo "Done successfully!"

    - name: Upload Ready Binaries
      uses: actions/upload-artifact@v4
      with:
        name: SDCC-Android-Ready
        path: sdcc-extract/FINAL_SDCC/
        
